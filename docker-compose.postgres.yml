services:
  app:
    build:
      # 构建上下文目录。
      context: .

      # 使用的 Dockerfile 文件。
      dockerfile: Dockerfile

      # 构建目标阶段。
      # app-with-web：包含前端静态页面
      # app：仅后端 API
      target: ${DOCKER_TARGET:-app-with-web}

      # 传递给 Dockerfile 的构建参数。
      args:
        # 是否启用国内镜像源优化。
        USE_CN_MIRROR: ${USE_CN_MIRROR:-1}

        # Debian 主软件源。
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.aliyun.com/debian}

        # Debian 安全更新源。
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}

        # Python 包镜像源。
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}

        # pip 信任主机。
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}

        # npm 镜像源。
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}

        # 是否安装 Git 存储相关依赖。
        ENABLE_GIT_STORAGE: ${ENABLE_GIT_STORAGE:-0}

        # 独立 PostgreSQL 栈固定安装 PostgreSQL 依赖。
        ENABLE_POSTGRES_STORAGE: 1

    # 本地构建后的镜像名称。
    image: chatgpt2api_new:postgres

    # 容器名称。
    container_name: chatgpt2api_new-postgres-app

    # 等待 PostgreSQL 健康后再启动应用。
    depends_on:
      postgres:
        condition: service_healthy

    # 应用端口映射。
    ports:
      - "9090:80"

    # 数据卷挂载。
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json

    # 应用运行时环境变量。
    environment:
      # PostgreSQL 模式下固定使用 postgres 存储。
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}

      # 应用连接内置 postgres 服务的地址。
      DATABASE_URL: ${DATABASE_URL:-postgresql://chatgpt2api:chatgpt2api@postgres:5432/chatgpt2api}

      # Git 仓库地址。
      GIT_REPO_URL: ${GIT_REPO_URL:-}

      # Git 访问令牌。
      GIT_TOKEN: ${GIT_TOKEN:-}

      # Git 分支名。
      GIT_BRANCH: ${GIT_BRANCH:-main}

      # Git 仓库中账号数据文件路径。
      GIT_FILE_PATH: ${GIT_FILE_PATH:-accounts.json}

      # Git 仓库中鉴权密钥数据文件路径。
      GIT_AUTH_KEYS_FILE_PATH: ${GIT_AUTH_KEYS_FILE_PATH:-auth_keys.json}

      # 应用鉴权密钥。
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}

      # 对外访问基础 URL。
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}

  postgres:
    # PostgreSQL 官方镜像。
    image: postgres:17-alpine

    # 容器名称。
    container_name: chatgpt2api_new-postgres

    # 重启策略。
    restart: unless-stopped

    # 端口映射。
    # 左边是宿主机端口，右边是容器内 PostgreSQL 端口。
    # 如果本机 5432 已被占用，可以改左边的 POSTGRES_PORT，例如 5433。
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    # Postgres 初始化环境变量。
    environment:
      # 数据库名。
      POSTGRES_DB: ${POSTGRES_DB:-chatgpt2api}

      # 数据库用户名。
      POSTGRES_USER: ${POSTGRES_USER:-chatgpt2api}

      # 数据库密码。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatgpt2api}

    # 数据持久化卷。
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # 健康检查。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatgpt2api} -d ${POSTGRES_DB:-chatgpt2api}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    # Postgres 数据卷。
