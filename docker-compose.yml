services:
  app:
    # 直接使用远端已构建镜像。
    image: ghcr.io/basketikun/chatgpt2api:latest

    # 容器名称。
    container_name: chatgpt2api

    # 重启策略。
    restart: unless-stopped

    # 端口映射。
    ports:
      - "9000:80"

    # 让容器可通过 host.docker.internal 访问宿主机（用于连宿主机上的 Cloudflare WARP 代理）。
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 数据卷挂载。
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json

    # 应用运行时环境变量。
    environment:
      # 存储后端类型。
      # 可选值：json、sqlite、postgres、git
      STORAGE_BACKEND: ${STORAGE_BACKEND:-sqlite}

      # 数据库连接地址。
      # sqlite/postgres 模式使用；默认指向容器内 SQLite 文件。
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/accounts.db}

      # Git 仓库地址。
      GIT_REPO_URL: ${GIT_REPO_URL:-}

      # Git 访问令牌。
      GIT_TOKEN: ${GIT_TOKEN:-}

      # Git 分支名。
      GIT_BRANCH: ${GIT_BRANCH:-main}

      # Git 仓库中账号数据文件路径。
      GIT_FILE_PATH: ${GIT_FILE_PATH:-accounts.json}

      # Git 仓库中鉴权密钥数据文件路径。
      GIT_AUTH_KEYS_FILE_PATH: ${GIT_AUTH_KEYS_FILE_PATH:-auth_keys.json}

      # 应用鉴权密钥。
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}

      # 对外访问基础 URL。
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
